services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-oku}
      POSTGRES_USER: ${POSTGRES_USER:-oku}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-oku}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-oku} -d ${POSTGRES_DB:-oku}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://oku:oku@db:5432/oku?schema=public}
      PORT: 4000
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "4000:4000"
    volumes:
      - .:/app
      - api_node_modules:/app/node_modules
      - api_pnpm_store:/pnpm/store
    command: sh -c "pnpm install && pnpm prisma:generate && pnpm prisma:push && pnpm --filter api start:dev"

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://oku:oku@db:5432/oku?schema=public}
      PORT: 4001
      RUN_WORKER: "true"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - api_node_modules:/app/node_modules
      - api_pnpm_store:/pnpm/store
    command: sh -c "pnpm install && pnpm prisma:generate && pnpm prisma:push && pnpm --filter api start:worker:dev"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:4000}
      PORT: 3000
    depends_on:
      - api
      - worker
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - web_node_modules:/app/node_modules
      - web_pnpm_store:/pnpm/store
    command: sh -c "pnpm install && pnpm --filter web dev"

volumes:
  postgres_data:
  api_node_modules:
  web_node_modules:
  api_pnpm_store:
  web_pnpm_store:
